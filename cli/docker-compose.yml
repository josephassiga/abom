# Local development stack. `docker compose up` then `make migrate && make demo`.
# In production all of this runs inside the customer's Kubernetes (see charts/abom).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: abom
      POSTGRES_PASSWORD: abom
      POSTGRES_DB: abom
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abom"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on: [postgres]
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: abom
      POSTGRES_PWD: abom
      POSTGRES_SEEDS: postgres
    ports: ["7233:7233"]

  api:
    build: .
    command: uvicorn abom.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      ABOM_DATABASE_URL: postgresql+asyncpg://abom:abom@postgres:5432/abom
      ABOM_TEMPORAL_HOST: temporal:7233
    depends_on: [postgres, temporal, minio]
    ports: ["8000:8000"]

  worker:
    build: .
    command: python -m abom.orchestration
    env_file: .env
    environment:
      ABOM_DATABASE_URL: postgresql+asyncpg://abom:abom@postgres:5432/abom
      ABOM_TEMPORAL_HOST: temporal:7233
    depends_on: [postgres, temporal, minio]
